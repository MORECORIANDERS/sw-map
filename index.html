<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>可转债申万行业思维导图</title>

  <!-- 自定义样式 -->
  <link rel="stylesheet" href="css/style.css?v=3" />
</head>
<body>
  <!-- 顶部工具栏 -->
  <div class="toolbar">
    <div class="title">可转债申万行业思维导图</div>

    <!-- 搜索框 -->
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="搜转债名称 / 代码 / 正股…" autocomplete="off" />
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>

    <div class="actions">
      <button onclick="expandAll()">展开全部</button>
      <button onclick="collapseAll()">收起全部</button>
      <button onclick="resetView()">重置视图</button>
    </div>

    <span class="data-info" id="dataInfo">数据加载中…</span>
  </div>

  <!-- 脑图主区域 -->
  <div id="main">
    <div id="chart-wrapper">
      <div id="chart-container"></div>
    </div>
  </div>

  <!-- 详情面板 -->
  <div id="detail-panel">
    <div class="panel-header">
      <h3>欢迎使用</h3>
      <button class="close-btn" onclick="closePanel()">&times;</button>
    </div>
    <div class="panel-body">
      <p class="hint">
        点击左侧脑图中的任意节点查看详情。点击具体转债节点可查看代码、规模、评级、转股价值等完整信息。
      </p>
      <p class="hint">
        🔍 顶栏搜索框支持输入转债名称、代码或正股名称快速定位。
      </p>
    </div>
  </div>

  <!-- 图例 -->
  <div class="legend">
    <div class="legend-title">六大风格板块</div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #f59e0b;"></span>
      <span>周期</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #06b6d4;"></span>
      <span>先进制造</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #8b5cf6;"></span>
      <span>科技(TMT)</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #ef4444;"></span>
      <span>消费</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #10b981;"></span>
      <span>医药医疗</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #d97706;"></span>
      <span>金融地产</span>
    </div>
  </div>

  <!-- ECharts JS（双 CDN 容错） -->
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
  <script>window.__EC = window.echarts;</script>
  <script>(function(){if(typeof echarts==='undefined'){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js';document.body.appendChild(s);}})();</script>

  <!-- 自定义脚本 -->
  <script src="js/apiConfig.js"></script>
  <script src="js/swIndustryData.js"></script>

  <script>
  (function() {
    var infoEl = document.getElementById('dataInfo');

    if (infoEl) infoEl.textContent = '加载数据中…';

    // 尝试从 localStorage 恢复缓存
    var isCached = false;
    try {
      var cache = JSON.parse(localStorage.getItem('sw_map_data'));
      if (cache && cache.v === 1 && Date.now() - cache.t < 86400000) {
        window.STOCK_INDUSTRY_MAP = cache.s;
        window.BOND_DETAIL_MAP = cache.b;
        window.BOND_LIST = cache.l || [];
        isCached = true;
        var cc = Object.keys(window.BOND_DETAIL_MAP).length;
        if (infoEl) infoEl.textContent = '🔄 刷新数据… (' + cc + ' 只)';
      }
    } catch(e) {}

    // 去重脚本加载
    var loadedScripts = {};
    function loadJS(src, cb) {
      if (loadedScripts[src]) { if (cb) setTimeout(cb, 0); return; }
      loadedScripts[src] = true;
      var s = document.createElement('script');
      s.src = src;
      s.onload = function() { if (cb) cb(); };
      s.onerror = function() { if (cb) cb(); };
      document.body.appendChild(s);
    }

    var appStarted = false;
    function startApp() {
      if (appStarted) return;
      appStarted = true;
      loadJS('js/app.js');
    }

    // API 获取
    function tryAPI(url) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.timeout = 10000;
      xhr.onload = function() {
        if (xhr.status === 200) {
          try {
            var r = JSON.parse(xhr.responseText);
            if (r.success && r.data) {
              onData(r.data);
              return;
            }
          } catch(e) {}
        }
        onFail();
      };
      xhr.onerror = function() { onFail(); };
      xhr.ontimeout = function() { onFail(); };
      xhr.send();
    }

    function onData(d) {
      window.BOND_DETAIL_MAP = d.detailMap || {};
      window.BOND_LIST = d.list || [];
      var n = Object.keys(window.BOND_DETAIL_MAP).length;
      if (infoEl) infoEl.textContent = '数据: ' + (d.generatedAt || '') + ' │ ' + n + ' 只';

      // 缓存到 localStorage
      try { localStorage.setItem('sw_map_data', JSON.stringify({
        v: 1, t: Date.now(),
        s: window.STOCK_INDUSTRY_MAP,
        b: window.BOND_DETAIL_MAP,
        l: window.BOND_LIST
      })); } catch(e) {}

      startApp();
    }

    var apiRetries = 1;
    function onFail() {
      if (apiRetries > 0) {
        apiRetries--;
        tryAPI(API_CONFIG.baseUrlAlt + API_CONFIG.dataPath + '?token=' + API_CONFIG.token);
        return;
      }
      if (isCached) {
        if (infoEl) infoEl.textContent = '📦 离线模式 (缓存)';
        if (typeof STOCK_INDUSTRY_MAP === 'undefined') {
          loadJS('js/stockIndustryMap.js', startApp);
        } else {
          startApp();
        }
        return;
      }
      if (infoEl) infoEl.textContent = '加载静态数据…';
      loadJS('js/stockIndustryMap.js', function() {
        loadJS('js/bondData.js', function() {
          try {
            var n = Object.keys(window.BOND_DETAIL_MAP || {}).length;
            localStorage.setItem('sw_map_data', JSON.stringify({
              v: 1, t: Date.now(),
              s: window.STOCK_INDUSTRY_MAP,
              b: window.BOND_DETAIL_MAP,
              l: window.BOND_LIST || []
            }));
            if (infoEl) infoEl.textContent = '数据: ' + n + ' 只';
          } catch(e) {}
          startApp();
        });
      });
    }

    // 加载 stockIndustryMap，然后试 API
    if (isCached && typeof STOCK_INDUSTRY_MAP !== 'undefined') {
      tryAPI(API_CONFIG.baseUrl + API_CONFIG.dataPath + '?token=' + API_CONFIG.token);
    } else {
      loadJS('js/stockIndustryMap.js', function() {
        tryAPI(API_CONFIG.baseUrl + API_CONFIG.dataPath + '?token=' + API_CONFIG.token);
      });
    }
  })();
  </script>
</body>
</html>
