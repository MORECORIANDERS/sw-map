<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>可转债申万行业思维导图</title>

  <!-- 自定义样式 -->
  <link rel="stylesheet" href="css/style.css?v=3" />
</head>
<body>
  <!-- 顶部工具栏 -->
  <div class="toolbar">
    <div class="title">可转债申万行业思维导图</div>

    <!-- 搜索框 -->
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="搜转债名称 / 代码 / 正股…" autocomplete="off" />
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>

    <div class="actions">
      <button onclick="expandAll()">展开全部</button>
      <button onclick="collapseAll()">收起全部</button>
      <button onclick="resetView()">重置视图</button>
    </div>

    <span class="data-info" id="dataInfo">数据加载中…</span>
  </div>

  <!-- 脑图主区域 -->
  <div id="main">
    <div id="chart-wrapper">
      <div id="chart-container"></div>
    </div>
  </div>

  <!-- 详情面板 -->
  <div id="detail-panel">
    <div class="panel-header">
      <h3>欢迎使用</h3>
      <button class="close-btn" onclick="closePanel()">&times;</button>
    </div>
    <div class="panel-body">
      <p class="hint">
        点击左侧脑图中的任意节点查看详情。点击具体转债节点可查看代码、规模、评级、转股价值等完整信息。
      </p>
      <p class="hint">
        🔍 顶栏搜索框支持输入转债名称、代码或正股名称快速定位。
      </p>
    </div>
  </div>

  <!-- 图例 -->
  <div class="legend">
    <div class="legend-title">六大风格板块</div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #f59e0b;"></span>
      <span>周期</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #06b6d4;"></span>
      <span>先进制造</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #8b5cf6;"></span>
      <span>科技(TMT)</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #ef4444;"></span>
      <span>消费</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #10b981;"></span>
      <span>医药医疗</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #d97706;"></span>
      <span>金融地产</span>
    </div>
  </div>

  <!-- ECharts JS -->
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>

  <!-- 自定义脚本 -->
  <script src="js/apiConfig.js"></script>
  <script src="js/swIndustryData.js"></script>

  <!-- 数据加载（优先从 API 拉取，失败则用本地缓存/降级） -->
  <script>
  (function() {
    // 尝试从 localStorage 恢复缓存
    var isCached = false;
    try {
      var cache = JSON.parse(localStorage.getItem('sw_map_data'));
      if (cache && cache.v === 1 && Date.now() - cache.t < 86400000) {
        window.STOCK_INDUSTRY_MAP = cache.s;
        window.BOND_DETAIL_MAP = cache.b;
        window.BOND_LIST = cache.l || [];
        isCached = true;
      }
    } catch(e) {}

    function loadScript(src, cb) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = cb;
      s.onerror = cb;
      document.body.appendChild(s);
    }

    function loadApp() {
      loadScript('js/app.js');
    }

    // 从 API 拉取债券数据
    function fetchBondData() {
      var url = API_CONFIG.baseUrl + API_CONFIG.dataPath + '?token=' + API_CONFIG.token;
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.timeout = 15000;
      xhr.onload = function() {
        if (xhr.status === 200) {
          try {
            var resp = JSON.parse(xhr.responseText);
            if (resp.success && resp.data) {
              var detailMap = resp.data.detailMap || {};
              var bondList = resp.data.list || [];
              window.BOND_DETAIL_MAP = detailMap;
              window.BOND_LIST = bondList;

              // 更新数据信息
              var infoEl = document.getElementById('dataInfo');
              if (infoEl) {
                var total = resp.data.total || Object.keys(detailMap).length;
                infoEl.textContent = '数据: ' + (resp.data.generatedAt || '') + ' │ ' + total + ' 只 (API)';
              }

              // 缓存到 localStorage
              setTimeout(function() {
                try {
                  if (typeof STOCK_INDUSTRY_MAP !== 'undefined') {
                    localStorage.setItem('sw_map_data', JSON.stringify({
                      v: 1, t: Date.now(),
                      s: window.STOCK_INDUSTRY_MAP,
                      b: window.BOND_DETAIL_MAP,
                      l: window.BOND_LIST || []
                    }));
                  }
                } catch(e) {}
              }, 1000);

              // 如果 stockIndustryMap 还没加载，现在加载
              if (typeof STOCK_INDUSTRY_MAP === 'undefined') {
                loadScript('js/stockIndustryMap.js', loadApp);
              } else {
                loadApp();
              }
              return;
            }
          } catch(e) {
            console.warn('API 数据解析失败:', e);
          }
        }
        // API 失败，使用缓存或降级方案
        fetchBondDataFailed();
      };
      xhr.onerror = fetchBondDataFailed;
      xhr.ontimeout = fetchBondDataFailed;
      xhr.send();
    }

    // API 拉取失败后的降级
    function fetchBondDataFailed() {
      if (isCached) {
        // 已有内存缓存，直接启动
        loadApp();
        return;
      }
      // 无缓存，加载本地静态文件
      loadScript('js/stockIndustryMap.js', function() {
        loadScript('js/bondData.js', function() {
          // 数据加载后缓存
          window.addEventListener('load', function() {
            setTimeout(function() {
              try {
                if (typeof STOCK_INDUSTRY_MAP !== 'undefined' && typeof BOND_DETAIL_MAP !== 'undefined') {
                  localStorage.setItem('sw_map_data', JSON.stringify({
                    v: 1, t: Date.now(),
                    s: STOCK_INDUSTRY_MAP,
                    b: BOND_DETAIL_MAP,
                    l: typeof BOND_LIST !== 'undefined' ? BOND_LIST : []
                  }));
                  var infoEl = document.getElementById('dataInfo');
                  if (infoEl) infoEl.textContent = '数据: ' + (BOND_DETAIL_MAP.generatedAt || 'cache') + ' │ ' + Object.keys(BOND_DETAIL_MAP).length + ' 只';
                }
              } catch(e) {}
            }, 1000);
          });
          loadApp();
        });
      });
    }

    // 启动：先尝试 API 获取，同时加载 stockIndustryMap
    if (isCached) {
      // 有缓存，API 和本地文件并行
      fetchBondData();
    } else {
      // 无缓存，同时加载 stockIndustryMap.js + 尝试 API
      loadScript('js/stockIndustryMap.js', function() {
        // stockIndustryMap 加载完毕，等 API 回来
      });
      fetchBondData();
    }
  })();
  </script>
</body>
</html>
