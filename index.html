<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>可转债申万行业思维导图</title>

  <!-- 自定义样式 -->
  <link rel="stylesheet" href="css/style.css?v=3" />
</head>
<body>
  <!-- 顶部工具栏 -->
  <div class="toolbar">
    <div class="title">可转债申万行业思维导图</div>

    <!-- 搜索框 -->
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="搜转债名称 / 代码 / 正股…" autocomplete="off" />
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>

    <div class="actions">
      <button onclick="expandAll()">展开全部</button>
      <button onclick="collapseAll()">收起全部</button>
      <button onclick="resetView()">重置视图</button>
    </div>

    <span class="data-info" id="dataInfo">数据加载中…</span>
  </div>

  <!-- 脑图主区域 -->
  <div id="main">
    <div id="chart-wrapper">
      <div id="chart-container"></div>
    </div>
  </div>

  <!-- 详情面板 -->
  <div id="detail-panel">
    <div class="panel-header">
      <h3>欢迎使用</h3>
      <button class="close-btn" onclick="closePanel()">&times;</button>
    </div>
    <div class="panel-body">
      <p class="hint">
        点击左侧脑图中的任意节点查看详情。点击具体转债节点可查看代码、规模、评级、转股价值等完整信息。
      </p>
      <p class="hint">
        🔍 顶栏搜索框支持输入转债名称、代码或正股名称快速定位。
      </p>
    </div>
  </div>

  <!-- 图例 -->
  <div class="legend">
    <div class="legend-title">六大风格板块</div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #f59e0b;"></span>
      <span>周期</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #06b6d4;"></span>
      <span>先进制造</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #8b5cf6;"></span>
      <span>科技(TMT)</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #ef4444;"></span>
      <span>消费</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #10b981;"></span>
      <span>医药医疗</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background-color: #d97706;"></span>
      <span>金融地产</span>
    </div>
  </div>

  <!-- ECharts JS -->
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>

  <!-- 自定义脚本 -->
  <script src="js/apiConfig.js"></script>
  <script src="js/swIndustryData.js"></script>

  <!-- 数据加载（优先从 API 拉取，失败则用本地缓存/降级） -->
  <script>
  (function() {
    // 显示加载状态
    var infoEl = document.getElementById('dataInfo');
    if (infoEl) infoEl.textContent = '加载数据中…';

    // 尝试从 localStorage 恢复缓存
    var isCached = false;
    try {
      var cache = JSON.parse(localStorage.getItem('sw_map_data'));
      if (cache && cache.v === 1 && Date.now() - cache.t < 86400000) {
        window.STOCK_INDUSTRY_MAP = cache.s;
        window.BOND_DETAIL_MAP = cache.b;
        window.BOND_LIST = cache.l || [];
        isCached = true;
        if (infoEl) {
          var cnt = Object.keys(window.BOND_DETAIL_MAP).length;
          infoEl.textContent = '🔄 刷新数据… (' + cnt + ' 只)';
        }
      }
    } catch(e) {}

    var scriptLoaded = {};
    function loadScript(src, cb) {
      if (scriptLoaded[src]) { if (cb) cb(); return; }
      scriptLoaded[src] = true;
      var s = document.createElement('script');
      s.src = src;
      s.onload = cb || null;
      s.onerror = cb || null;
      document.body.appendChild(s);
    }

    var appLoaded = false;
    function loadApp() {
      if (appLoaded) return;
      appLoaded = true;
      loadScript('js/app.js');
    }

    // 从指定 URL 拉取债券数据（带重试）
    function fetchFromUrl(url, retriesLeft) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.timeout = 10000;
      xhr.onload = function() {
        if (xhr.status === 200) {
          try {
            var resp = JSON.parse(xhr.responseText);
            if (resp.success && resp.data) {
              onDataLoaded(resp.data);
              return;
            }
          } catch(e) {}
        }
        onFetchFail(retriesLeft);
      };
      xhr.onerror = function() { onFetchFail(retriesLeft); };
      xhr.ontimeout = function() { onFetchFail(retriesLeft); };
      xhr.send();
    }

    function onDataLoaded(data) {
      var detailMap = data.detailMap || {};
      var bondList = data.list || [];
      window.BOND_DETAIL_MAP = detailMap;
      window.BOND_LIST = bondList;

      var total = data.total || Object.keys(detailMap).length;
      if (infoEl) infoEl.textContent = '数据: ' + (data.generatedAt || '') + ' │ ' + total + ' 只';

      // 缓存
      setTimeout(function() {
        try {
          if (typeof STOCK_INDUSTRY_MAP !== 'undefined') {
            localStorage.setItem('sw_map_data', JSON.stringify({
              v: 1, t: Date.now(),
              s: window.STOCK_INDUSTRY_MAP,
              b: window.BOND_DETAIL_MAP,
              l: window.BOND_LIST || []
            }));
          }
        } catch(e) {}
      }, 1000);

      // 确保 stockIndustryMap 已加载
      if (typeof STOCK_INDUSTRY_MAP === 'undefined') {
        loadScript('js/stockIndustryMap.js', loadApp);
      } else {
        loadApp();
      }
    }

    function onFetchFail(retriesLeft) {
      if (retriesLeft > 0) {
        // 尝试备用域名
        fetchFromUrl(API_CONFIG.baseUrlAlt + API_CONFIG.dataPath + '?token=' + API_CONFIG.token, retriesLeft - 1);
        return;
      }
      // 全部失败，走缓存或降级
      if (isCached) {
        if (infoEl) infoEl.textContent = '📦 离线模式 (缓存)';
        loadApp();
        return;
      }
      if (infoEl) infoEl.textContent = '加载静态数据…';
      loadScript('js/stockIndustryMap.js', function() {
        loadScript('js/bondData.js', function() {
          setTimeout(function() {
            try {
              if (typeof STOCK_INDUSTRY_MAP !== 'undefined' && typeof BOND_DETAIL_MAP !== 'undefined') {
                localStorage.setItem('sw_map_data', JSON.stringify({
                  v: 1, t: Date.now(),
                  s: STOCK_INDUSTRY_MAP,
                  b: BOND_DETAIL_MAP,
                  l: typeof BOND_LIST !== 'undefined' ? BOND_LIST : []
                }));
                if (infoEl) infoEl.textContent = '数据: ' + Object.keys(BOND_DETAIL_MAP).length + ' 只';
              }
            } catch(e) {}
          }, 1000);
          loadApp();
        });
      });
    }

    // 启动：先加载 stockIndustryMap，同时尝试 API
    if (isCached && typeof STOCK_INDUSTRY_MAP !== 'undefined') {
      // 有缓存且 stockIndustryMap 已就绪：并行尝试 API
      fetchFromUrl(API_CONFIG.baseUrl + API_CONFIG.dataPath + '?token=' + API_CONFIG.token, 1);
    } else {
      // 无缓存：先加载 stockIndustryMap
      loadScript('js/stockIndustryMap.js', function() {
        // 然后尝试 API
        fetchFromUrl(API_CONFIG.baseUrl + API_CONFIG.dataPath + '?token=' + API_CONFIG.token, 1);
      });
    }
  })();
  </script>
</body>
</html>
